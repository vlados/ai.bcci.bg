<!doctype html>
<html lang="{{LANG}}"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;600&family=Sofia+Sans+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px}
  body{font-family:'Sofia Sans',sans-serif;color:#121316;display:flex;overflow:hidden;position:relative;background:#fff}
  .top{position:absolute;top:0;left:0;right:0;height:10px;background:#ee272f;z-index:3}
  .main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 0 0 78px}
  .logo{width:600px;display:block}
  .rule{width:72px;height:5px;background:#ee272f;margin:40px 0 26px}
  .tag{font-family:'Sofia Sans Condensed',sans-serif;font-weight:700;font-size:30px;
       letter-spacing:.055em;text-transform:uppercase;color:#37383c;line-height:1.28;max-width:540px}
  .foot{display:flex;align-items:center;gap:12px;margin-top:52px;font-size:20px;font-weight:600;color:#6a6b70}
  .dot{width:10px;height:10px;border-radius:99px;background:#ee272f;display:block}
  .band{width:360px;background:#f6f5f2;border-left:1px solid #e6e4df;position:relative;overflow:hidden}
  /* Footer wordmark, bled off two edges the way the site does it. */
  .ghost{position:absolute;right:-54px;bottom:-146px;line-height:1;
         font-family:'Sofia Sans Condensed',sans-serif;font-weight:700;font-size:430px;
         color:rgba(18,19,22,.075);letter-spacing:-.03em}
</style></head>
<body>
  <div class="top"></div>
  <div class="main">
    <img class="logo" src="{{LOGO}}" alt="">
    <div class="rule"></div>
    <div class="tag">{{TAGLINE}}</div>
    <div class="foot"><span class="dot"></span><span>ai.bcci.bg</span></div>
  </div>
  <div class="band"><div class="ghost">ai</div></div>
</body></html>
